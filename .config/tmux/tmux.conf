# ============================================
# CONFIGURACIÓN BÁSICA
# ============================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -s set-clipboard on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ',xterm-256color:clipboard'
set -g default-shell /usr/bin/zsh

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 0
set -g mouse on

bind q kill-pane
bind Q kill-window

# ============================================
# ATAJOS DE TECLADO
# ============================================
bind r source-file ~/.config/tmux/.tmux.conf \; display "Configuración recargada!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ============================================
# TEMA — dark minimalista
# ============================================
# Barra de estado
set -g status-style bg=#111111,fg=#aaaaaa
set -g status-interval 60
set -g status-justify centre

# Ventanas
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-style bg=#111111,fg=#555555
setw -g window-status-current-style bg=#222222,fg=#cccccc,bold

# Panel izquierdo — nombre de sesión
set -g status-left-length 40
set -g status-left "#[fg=#aaaaaa,bg=#1a1a1a] #S #[default] "

# Panel derecho — fecha y hora
set -g status-right-length 60
set -g status-right "#[fg=#666666] %d/%m/%Y #[fg=#aaaaaa,bold] %H:%M "

# Bordes de panes
set -g pane-border-style fg=#222222
set -g pane-active-border-style fg=#444444

# Mensajes
set -g message-style bg=#222222,fg=#cccccc,bold

# Actividad
setw -g monitor-activity on
set -g visual-activity off

set-option -g destroy-unattached on

