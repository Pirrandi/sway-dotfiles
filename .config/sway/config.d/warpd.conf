# warpd — control del mouse con teclado
# Wayland no permite hotkeys globales dentro del proceso, así que cada modo
# se lanza directo desde sway. Desde "normal mode" también puedes entrar a
# hint (x), grid (g) y screen (s) sin volver a usar estos binds.
# IMPORTANTE: dentro de cualquier modo de warpd, Escape es la tecla de salida
# (Enter NO sale). Estos binds son toggle: si warpd ya está corriendo, el
# mismo atajo lo mata en vez de apilar otra instancia (eso causaba los
# cursores rojos que quedaban flotando).

bindsym $mod+Mod1+c exec pgrep -x warpd >/dev/null && pkill -x warpd || exec warpd --normal
bindsym $mod+Mod1+x exec pgrep -x warpd >/dev/null && pkill -x warpd || exec warpd --hint
bindsym $mod+Mod1+g exec pgrep -x warpd >/dev/null && pkill -x warpd || exec warpd --grid
bindsym $mod+Mod1+s exec pgrep -x warpd >/dev/null && pkill -x warpd || exec warpd --screen

# Tecla de pánico: mata cualquier instancia de warpd colgada, sin depender
# de acordarte de que Escape es la salida normal.
bindsym $mod+Escape exec pkill -x warpd
