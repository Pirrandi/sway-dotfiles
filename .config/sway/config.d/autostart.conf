exec_always sh -c 'pkill waybar; sleep 0.5; waybar &'
# mako ya lo maneja mako.service de systemd (dbus-activated + auto-restart).
# Matarlo y relanzarlo a mano acá compite contra ese servicio y deja rota la
# interfaz de control de makoctl (causaba el timeout de 25s al abrir el menú
# de addons). Si cambiás la config de mako, corré: systemctl --user reload mako.service
exec swayidle -w \
    timeout 900 'swaylock' \
    before-sleep 'swaylock'

# No contar como inactividad mientras haya una ventana en fullscreen (juegos,
# video) — swayidle solo ve teclado/mouse, así que con gamepad te bloqueaba
# a mitad de partida sin esto.
for_window [title=".*"] inhibit_idle fullscreen
exec systemctl --user import-environment XDG_DATA_DIRS
exec_always pkill swaybg; swaybg -i ~/Pictures/wallpaper.png -m fill &

# Scratchpad apps — se lanzan una vez y van al scratchpad automáticamente
exec otpclient
