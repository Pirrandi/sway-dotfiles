# ~/.config/alacritty/alacritty.toml

[window]
padding.x = 10
padding.y = 10
opacity = 0.85
blur = true
decorations = "full"
dynamic_title = true

[terminal.shell]
program = "/usr/bin/tmux"
args = ["new-session", "-f", "~/.config/tmux/tmux.conf"]

[scrolling]
history = 10000

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[colors.primary]
background = "#111111"
foreground = "#cccccc"

[colors.cursor]
text = "#111111"
cursor = "#cccccc"

[colors.normal]
black   = "#1a1a1a"
red     = "#cc3333"
green   = "#668844"
yellow  = "#aa8833"
blue    = "#4466aa"
magenta = "#774488"
cyan    = "#447788"
white   = "#aaaaaa"

[colors.bright]
black   = "#333333"
red     = "#dd4444"
green   = "#779955"
yellow  = "#bbaa44"
blue    = "#5577bb"
magenta = "#885599"
cyan    = "#558899"
white   = "#cccccc"

[cursor]
style = { shape = "Beam", blinking = "Always" }
blink_interval = 500
thickness = 0.1
unfocused_hollow = false

[selection]
save_to_clipboard = true

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"
